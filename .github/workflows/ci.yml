name: CI

# Runs on every push and pull request to main.
# Keeps CI lightweight and fast: it does NOT download the dataset or train
# the model (that needs a GPU and hours of compute). Instead it verifies the
# code is syntactically valid, imports cleanly, and passes lint/format checks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: ruff check src/

      - name: Check formatting with ruff
        run: ruff format --check src/

      - name: Byte-compile all modules
        # Catches syntax errors without needing the heavy ML dependencies.
        run: python -m compileall -q src/
