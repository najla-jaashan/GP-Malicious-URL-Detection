name: CI

# Runs on every push and pull request to main.
# Keeps CI lightweight and fast: it does NOT download the dataset or train
# the model (that needs a GPU and hours of compute). Instead it verifies the
# code is syntactically valid, imports cleanly, and passes lint/format checks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tooling and lightweight test deps
        # Deliberately does NOT install transformers/datasets/gradio: the unit
        # tests import only the light stack (heavy imports are lazy), so CI
        # stays fast and does not need a GPU or the dataset.
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pandas scikit-learn "torch>=2.0" --index-url https://download.pytorch.org/whl/cpu || pip install ruff pytest pandas scikit-learn torch

      - name: Lint with ruff
        run: ruff check src/ tests/ app.py

      - name: Check formatting with ruff
        run: ruff format --check src/ tests/ app.py

      - name: Byte-compile all modules
        run: python -m compileall -q src/ tests/ app.py

      - name: Run unit tests
        run: pytest tests/ -q
